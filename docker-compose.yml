services:

  postgres:
    image: postgres:16-alpine
    container_name: thyrotrack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: thyro
      POSTGRES_PASSWORD: thyro_secret
      POSTGRES_DB: thyrotrack
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thyro -d thyrotrack"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - thyrotrack-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: thyrotrack-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://thyro:thyro_secret@postgres:5432/thyrotrack
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      NODE_ENV: production
      PORT: 3001
      # Frontend et API partagent la même origine via Nginx (le navigateur
      # parle uniquement à nginx sur le port public). CORS_ORIGIN reste un
      # garde-fou si jamais le backend est appelé directement.
      FRONTEND_URL: http://localhost:8080
    networks:
      - thyrotrack-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: thyrotrack-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - thyrotrack-network

  nginx:
    build:
      context: ./nginx
    container_name: thyrotrack-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
      - frontend
    networks:
      - thyrotrack-network

networks:
  thyrotrack-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
