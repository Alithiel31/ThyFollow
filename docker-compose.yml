services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: thyro
      POSTGRES_PASSWORD: thyro_secret
      POSTGRES_DB: thyrotrack
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thyro -d thyrotrack"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: production
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://thyro:thyro_secret@postgres:5432/thyrotrack
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      NODE_ENV: production
      PORT: 3001
    ports:
      - "80:3001"

volumes:
  postgres_data: