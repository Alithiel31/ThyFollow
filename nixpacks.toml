[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = [
  "npm run build --workspace=backend",
  "npm run build --workspace=frontend",
  "cd backend && npx prisma generate"
]

[start]
cmd = "cd backend && npx prisma migrate deploy && node dist/index.js"
